version: 2
type: magent
dimensions:
  - name: completeness
    weight: 0.25
    criterion: >
      Does the main-agent config cover key governance areas: project/stack,
      commands/tools, verification/testing, conventions/style, safety/security,
      and documentation/references? Configs may be frontmatter-optional
      (AGENTS.md/CLAUDE.md are plain markdown by design). Penalize missing
      governance sections regardless of frontmatter presence.
    anchors:
      excellent: "All governance areas covered; project, commands, verification, conventions, safety, docs."
      poor: "Few governance sections; config is mostly unstructured or bare."
  - name: platform-coverage
    weight: 0.25
    criterion: >
      Does the config address all platforms it claims to support? Penalize
      platforms listed in scope but with no corresponding rules, and rules
      that reference capabilities a listed platform lacks.
    anchors:
      excellent: "Every listed platform has corresponding rules; rules respect each platform's capabilities."
      poor: "Platforms listed without rules, or rules reference capabilities a platform lacks."

  - name: conciseness
    weight: 0.15
    criterion: >
      Is the config as short as possible while remaining complete? Penalize
      redundant rule restating, boilerplate that adds no information, and
      rules that could be merged without loss. Measurable proxies (folded in,
      not a new dimension): body is free of curated no-op phrases ("be
      helpful", "think carefully") that restate default model behavior without
      changing it; body has low within-body n-gram duplication. A magent
      config (AGENTS.md/CLAUDE.md) has no separate frontmatter description
      field — it is read wholesale rather than dispatch-selected — so the
      description-budget check that applies to skill/command/agent does not
      apply here.
    anchors:
      excellent: "Minimal length with no redundancy; every rule carries unique information; no no-op phrasing."
      poor: "Redundant rules, boilerplate, or no-op phrasing that adds no signal; rules could be merged without loss."

  - name: tone-consistency
    weight: 0.20
    criterion: >
      Is the agent's tone consistent across the config? Penalize mixed
      registers (formal header + casual body), inconsistent second/third
      person, and persona drift between sections.
    anchors:
      excellent: "Single register and person throughout; persona is stable across all sections."
      poor: "Mixed registers, inconsistent person, or persona drift between sections."

  - name: safety
    weight: 0.15
    criterion: >
      Does the config avoid dangerous defaults? Penalize configs that grant
      blanket permissions, disable safety gates by default, or route
      destructive actions without an explicit guard.
    anchors:
      excellent: "Least-privilege defaults; safety gates enabled; destructive actions guarded."
      poor: "Blanket permissions or disabled safety gates without justification."
