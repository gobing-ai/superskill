version: 1
type: command
dimensions:
  - name: completeness
    weight: 0.25
    criterion: >
      Does the command frontmatter include the required description field
      and optional-but-expected fields (argument-hint string, allowed-tools array)?
      A complete command declares its purpose and signals what tools and arguments
      it uses. Penalize missing description; reward argument-hint and allowed-tools.
    anchors:
      excellent: "Description present; argument-hint and allowed-tools declared."
      poor: "Missing description; no argument-hint or allowed-tools signals."
  - name: clarity
    weight: 0.25
    criterion: >
      Is the command's purpose and usage unambiguous? The description should
      tell the user what it does and when to use it. Penalize descriptions
      that restate the command name without adding information.
    anchors:
      excellent: "Description states what the command does, when to use it, and what the output means."
      poor: "Description restates the command name; user cannot tell when to use it."

  - name: argument-hints
    weight: 0.20
    criterion: >
      Is the argument-hint string clear, descriptive, and consistent with
      Claude Code conventions? A rich hint names positional args (<agent-name>)
      and flags ([--description <text>]). Penalize placeholder-only hints or
      missing hints on commands that take parameters.
    anchors:
      excellent: "Argument-hint string names positional args and flags with descriptions."
      poor: "Argument-hint is empty, placeholder-only, or missing on a parameterized command."
  - name: tool-references
    weight: 0.15
    criterion: >
      Are tool references (if any) correct and reachable? Penalize commands
      that reference tools the CLI does not expose, or tools that are exposed
      but never documented in the command's usage.
    anchors:
      excellent: "Tool references match exposed CLI verbs; no orphaned or undocumented references."
      poor: "Tool references are stale, orphaned, or undocumented."

  - name: slash-syntax
    weight: 0.15
    criterion: >
      Is the slash command syntax correct and consistent? Penalize syntax
      that diverges from the platform convention, inconsistent argument
      ordering, and missing required markers.
    anchors:
      excellent: "Syntax follows platform convention; argument ordering is consistent across sibling commands."
      poor: "Syntax diverges from convention or is inconsistent with sibling commands."
