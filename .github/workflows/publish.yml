name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - '@gobing-ai/superskill-v*'

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Trusted Publishing requires npm >= 11.5.1 and Node >= 22.
      # setup-bun provides Bun for build/test; npm publish runs on system Node.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish --workspace apps/cli --provenance --access public
