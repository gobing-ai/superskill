# [STRICT — opt-in] HTTP-client boundaries. Adapted from ts-libs, re-scoped to
# Bun workspaces layout. NOT in recommended-pre-check.
# Opt in via: spur rule run --preset strict-check  (or --rule <id>).
include:
  - "apps/**/src/**/*.ts"
  - "packages/**/src/**/*.ts"
exclude:
  - "**/tests/**"
  - "**/*.test.ts"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/vendors/**"

rules:
  - id: no-direct-fetch
    description: "Prefer a centralized HTTP client over ad-hoc fetch(...)."
    severity: warning
    evaluator:
      type: rg
      config:
        pattern: "(^|[^.[:alnum:]_])fetch\\("

  - id: no-globalthis-fetch
    description: "Avoid globalThis.fetch(...); route HTTP through a client seam when one exists."
    severity: warning
    evaluator:
      type: rg
      config:
        pattern: "globalThis\\.fetch\\("

  - id: no-xml-http-request
    description: "Do not use XMLHttpRequest in a Bun/Node codebase."
    severity: error
    evaluator:
      type: rg
      config:
        pattern: "new\\s+XMLHttpRequest\\("
    include:
      - "apps/**/src/**/*.ts"
      - "packages/**/src/**/*.ts"

  - id: no-third-party-http-clients
    description: "Use the platform fetch / a project client instead of ad-hoc HTTP client libraries (axios/got/ky/ofetch/undici)."
    severity: error
    evaluator:
      type: forbidden-import
      config:
        forbidden:
          - specifier: "axios"
          - specifier: "got"
          - specifier: "ky"
          - specifier: "ofetch"
          - specifier: "undici"
        scope:
          include:
            - "apps/**/*.ts"
            - "packages/**/*.ts"
          exclude:
            - "**/tests/**"
            - "**/*.test.ts"
            - "**/dist/**"
            - "**/vendors/**"
