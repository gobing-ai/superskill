# Coverage gate — per-file line coverage meets threshold from Bun's lcov output.
# DISABLED: Bun 1.3.14 does not generate lcov files with --coverage-reporter=lcov.
# Re-enable when Bun coverage reporting is fixed or upgraded.
rules:
  - id: coverage-gate
    description: "Per-file line coverage meets 70% threshold (read from lcov)"
    severity: error
    enabled: true
    evaluator:
      type: coverage-gate
      config:
        lcovPath: .coverage/lcov.info
        threshold: 70
        include:
          - "apps/**/src/**"
          - "packages/**/src/**"
        exclude:
          - "**/node_modules/**"
          - "**/vendors/**"
          - "**/dist/**"
          - "**/tests/**"
          - "**/stubs/**"
