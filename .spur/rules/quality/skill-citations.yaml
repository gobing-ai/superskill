# Skill citation-resolution gate — runs in the recommended-post-check preset.
#
# Catches documentation drift the pure content heuristics cannot see: dead
# `path:line` code citations and rubric dimension-count claims that disagree
# with the rubric YAML a skill documents. See scripts/check-skill-citations.ts
# for the two defect classes and why this lives outside packages/core.
rules:
  - id: skill-citations-resolve
    description: >
      Plugin SKILL.md code citations must resolve (file exists, line in range)
      and any "N dimensions" claim must match the rubric the skill documents.
    severity: error
    enabled: true
    evaluator:
      type: exit-code
      config:
        command: bun
        args:
          - scripts/check-skill-citations.ts
    include:
      - "plugins/**/SKILL.md"
