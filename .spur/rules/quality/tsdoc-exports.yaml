# TSDoc-on-exports — enforced by Spur's post-check gate.
# Adapted from ts-libs and re-scoped to Bun workspaces layout.
# Severity: error — TSDoc on exports is enforced by the post-check gate.
include:
  - "apps/**/src/**/*.ts"
  - "packages/**/src/**/*.ts"
exclude:
  - "**/node_modules/**"
  - "**/vendors/**"
  - "**/dist/**"
  - "**/tests/**"
rules:
  - id: every-export-has-tsdoc
    description: >
      Exported declarations should have a preceding TSDoc comment (info — aspirational).
    severity: error
    enabled: true
    evaluator:
      type: tsdoc-export
