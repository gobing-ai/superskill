# Output boundary rules — terminal writes go through the output seam
# (CLI entrypoint output utilities), never raw console/stdout.
# Adapted from ts-libs, re-scoped to Bun workspaces layout.
#
# Severity: info — superskill IS a CLI tool, so console
# output and stdout writes are inherent to its purpose. These rules serve as
# code-review guidance rather than hard gates. Bump to warning/error once a
# project-wide output seam is established.
include:
  - "apps/**/src/**/*.ts"
  - "packages/**/src/**/*.ts"
exclude:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/tests/**"

rules:
  - id: no-console-output
    description: "Prefer a structured output utility over direct console output."
    severity: error
    evaluator:
      type: rg
      config:
        pattern: "console\\.(log|error|warn|info|debug|dir|time|trace)"

  - id: no-raw-stdout-stderr
    description: "Prefer a structured output utility over process.stdout/stderr.write directly."
    severity: error
    evaluator:
      type: rg
      config:
        pattern: "process\\.(stdout|stderr)\\.write"
