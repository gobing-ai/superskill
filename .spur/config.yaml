# Spur project configuration for superskill
# Generated by `spur init`; upgraded 2026-07-16 to the spur-new layout (executors,
# default-by-phase, tasks section). See docs/99_PROJECT_CONSTITUTION.md for doc SSOT.

$schema: "@gobing-ai/spur/schemas/spur-config.schema.json"
version: "1"
name: superskill

# ── Portable bootstrap (consumed by @gobing-ai/ts-infra runNodeApplication) ──
# Shared across spur and (future) spur-server. Keys map 1:1 to ts-infra's
# LoggingOptions / TelemetryOptions / database / SchedulerOptions.
bootstrap:
  logging:
    enabled: true
    level: debug
    console: false
    json: false
    file: true
    filePath: .spur/logs/spur.log
  telemetry:
    enabled: false
    serviceName: spur
    environment: development
  database:
    enabled: true
    driver: bun-sqlite
    url: .spur/spur.db
  scheduler:
    enabled: false

# ── Spur app section (validated by a local zod schema — UNCHANGED keys) ──
agent:
  default: pi
  executors:
    - name: omp
      agent: omp
    - name: omp-zai
      agent: omp
      model: zai/glm-5.2
    - name: omp-xf
      agent: omp
      model: astron-code-latest
    - name: pi
      agent: pi
    - name: pi-xf
      agent: pi
      model: astron-code-latest
    - name: omp-zai-volc
      agent: omp
      model: volc/glm-5.2
    - name: omp-deepseek
      agent: omp
      model: deepseek/deepseek-v4-pro
    - name: minimax
      agent: omp
      model: minimax/MiniMax-M3
    - name: codex
      agent: codex
    - name: claude
      agent: claude
    - name: grok
      agent: grok
  default-by-phase:
    dev-brainstorm: grok
    dev-fixall: omp-xf
    dev-plan: grok
    dev-run: omp-xf
    dev-runall: omp-xf
    dev-changelog: omp-xf
    dev-gitmsg: minimax
    dev-review: grok
    dev-verify: grok

rules:
  paths:
    - .spur/rules/**/*.yaml

workflows:
  paths:
    - .spur/workflows/

redaction:
  enabled: false

# ── Tasks configuration (design §9 — absorbed from docs/.tasks/config.jsonc) ──
tasks:
  active: docs/tasks
  folders:
    docs/tasks:
      baseCounter: 0
      label: Primary
